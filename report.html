<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard Behat</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f19;
        --panel: #12182a;
        --panel-2: #0f1526;
        --text: #e8eefc;
        --muted: #a7b3d1;
        --border: rgba(255, 255, 255, 0.12);
        --shadow: rgba(0, 0, 0, 0.4);
        --radius: 14px;
        --accent: #7aa2ff;
        --ok: #60d394;
        --warn: #ffcc66;
        --bad: #ff5c7a;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --panel: #ffffff;
          --panel-2: #f2f4fb;
          --text: #0e1a33;
          --muted: #52617f;
          --border: rgba(14, 26, 51, 0.14);
          --shadow: rgba(14, 26, 51, 0.14);
          --accent: #275dff;
          --ok: #0b7a46;
          --warn: #b35c00;
          --bad: #d1304c;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 700px at 30% -10%, rgba(122, 162, 255, 0.25), transparent 60%),
          radial-gradient(1000px 600px at 80% 0%, rgba(96, 211, 148, 0.16), transparent 55%), var(--bg);
        color: var(--text);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .skip-link {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        transform: translateY(-140%);
        transition: transform 140ms ease;
        z-index: 1000;
      }

      .skip-link:focus {
        transform: translateY(0);
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: color-mix(in oklab, var(--bg) 60%, transparent);
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 16px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 900px) {
        .header-inner {
          grid-template-columns: 420px 1fr;
          align-items: center;
        }
      }

      .brand {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 10px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .controls {
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .search {
        flex: 1 1 320px;
        display: flex;
        gap: 10px;
      }

      input[type="search"] {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        outline: none;
      }

      input[type="search"]::placeholder {
        color: color-mix(in oklab, var(--muted) 80%, transparent);
      }

      .btn {
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        user-select: none;
      }

      .btn:hover {
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      input[type="search"]:focus-visible,
      .btn:focus-visible,
      details.feature > summary:focus-visible {
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 40px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--panel-2) 84%, transparent);
        color: var(--text);
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .chip[data-active="true"] {
        border-color: color-mix(in oklab, var(--accent) 65%, var(--border));
        background: color-mix(in oklab, var(--accent) 18%, var(--panel));
      }

      .chip .count {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .top-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        margin-bottom: 14px;
      }

      @media (min-width: 900px) {
        .top-grid {
          grid-template-columns: 1.15fr 0.85fr;
        }
      }

      .card {
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          color-mix(in oklab, var(--panel) 92%, transparent),
          color-mix(in oklab, var(--panel-2) 98%, transparent)
        );
        border-radius: var(--radius);
        box-shadow: 0 8px 24px var(--shadow);
        overflow: hidden;
      }

      .card-inner {
        padding: 14px;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        align-items: baseline;
      }

      .title-row h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      @media (min-width: 680px) {
        .kpis {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      .kpi {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        padding: 10px 10px 8px;
      }

      .kpi .label {
        color: var(--muted);
        font-size: 12px;
      }

      .kpi .value {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2px;
        font-variant-numeric: tabular-nums;
      }

      .bar {
        height: 10px;
        border-radius: 999px;
        background: color-mix(in oklab, var(--panel-2) 86%, transparent);
        overflow: hidden;
        border: 1px solid var(--border);
        margin-top: 10px;
      }

      .bar > .seg {
        height: 100%;
        float: left;
      }

      .seg.ok {
        background: color-mix(in oklab, var(--ok) 85%, transparent);
      }
      .seg.bad {
        background: color-mix(in oklab, var(--bad) 85%, transparent);
      }
      .seg.warn {
        background: color-mix(in oklab, var(--warn) 85%, transparent);
      }
      .seg.other {
        background: color-mix(in oklab, var(--accent) 55%, transparent);
      }

      details.feature {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }

      details.feature > summary {
        list-style: none;
        cursor: pointer;
        padding: 12px 12px 10px;
        display: grid;
        gap: 6px;
      }

      details.feature > summary::-webkit-details-marker {
        display: none;
      }

      .feature-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }

      .feature-head .name {
        margin: 0;
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .feature-head .counts {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: baseline;
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .feature-sub {
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .scenario-list {
        border-top: 1px solid var(--border);
        padding: 10px 12px 12px;
        display: grid;
        gap: 8px;
      }

      .scenario {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 10px 9px;
        background: color-mix(in oklab, var(--panel-2) 82%, transparent);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .scenario .name {
        min-width: 0;
        overflow-wrap: anywhere;
        font-weight: 650;
      }

      .badge {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        border-radius: 999px;
        padding: 3px 8px;
        border: 1px solid var(--border);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .badge.ok {
        color: color-mix(in oklab, var(--ok) 90%, var(--text));
        background: color-mix(in oklab, var(--ok) 14%, transparent);
        border-color: color-mix(in oklab, var(--ok) 55%, var(--border));
      }

      .badge.bad {
        color: color-mix(in oklab, var(--bad) 92%, var(--text));
        background: color-mix(in oklab, var(--bad) 12%, transparent);
        border-color: color-mix(in oklab, var(--bad) 55%, var(--border));
      }

      .badge.warn {
        color: color-mix(in oklab, var(--warn) 92%, var(--text));
        background: color-mix(in oklab, var(--warn) 16%, transparent);
        border-color: color-mix(in oklab, var(--warn) 55%, var(--border));
      }

      .badge.other {
        color: color-mix(in oklab, var(--accent) 90%, var(--text));
        background: color-mix(in oklab, var(--accent) 12%, transparent);
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      .empty {
        padding: 26px 16px;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--muted);
        text-align: center;
        background: color-mix(in oklab, var(--panel) 70%, transparent);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#content">Aller au contenu</a>
    <header>
      <div class="header-inner">
        <div class="brand">
          <h1>Dashboard Behat</h1>
          <p id="sourceMeta" class="hint">Source: ./capabilities/behat_status.json</p>
        </div>
        <div class="controls">
          <div class="row search">
            <input id="search" type="search" placeholder='Rechercher (ex: "Judge management", "skipped")' />
            <button id="clear" class="btn" type="button">Effacer</button>
            <a class="btn" href="./index.html">Retour</a>
          </div>
          <div class="row">
            <div id="statusChips" class="chips" role="list"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <main id="content">
        <div class="top-grid">
          <section class="card" aria-label="Résumé">
            <div class="card-inner">
              <div class="title-row">
                <h2>Résumé</h2>
                <div id="runMeta" class="meta"></div>
              </div>
              <div class="kpis">
                <div class="kpi">
                  <div class="label">Scénarios</div>
                  <div id="kpiScenarios" class="value">—</div>
                </div>
                <div class="kpi">
                  <div class="label">Features</div>
                  <div id="kpiFeatures" class="value">—</div>
                </div>
                <div class="kpi">
                  <div class="label">État</div>
                  <div id="kpiState" class="value">—</div>
                </div>
                <div class="kpi">
                  <div class="label">Durée</div>
                  <div id="kpiDuration" class="value">—</div>
                </div>
              </div>
              <div class="bar" aria-label="Répartition des statuts">
                <div id="barPassed" class="seg ok"></div>
                <div id="barFailed" class="seg bad"></div>
                <div id="barSkipped" class="seg warn"></div>
                <div id="barOther" class="seg other"></div>
              </div>
              <div id="barLegend" class="meta" style="margin-top: 8px"></div>
            </div>
          </section>

          <section class="card" aria-label="Aperçu">
            <div class="card-inner">
              <div class="title-row">
                <h2>Aperçu</h2>
                <div id="updatedMeta" class="meta"></div>
              </div>
              <div id="overview" class="meta" style="margin-top: 10px"></div>
            </div>
          </section>
        </div>

        <div id="featureList" class="grid"></div>
      </main>
    </div>

    <script src="./report.js"></script>
  </body>
</html>
