<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Client Pack</title>
    <style>
      :root {
        --card-inner-bg: beige;
        --capability-header-bg: cornsilk;
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --panel-2: #f2f4fb;
        --text: #0e1a33;
        --muted: #52617f;
        --border: rgba(14, 26, 51, 0.14);
        --accent: #275dff;
        --accent-2: #0b7a46;
        --warning: #b35c00;
        --shadow: rgba(14, 26, 51, 0.14);
        --radius: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --card-inner-bg: color-mix(in oklab, var(--panel) 92%, var(--accent) 8%);
          --capability-header-bg: color-mix(in oklab, var(--panel) 90%, var(--warning) 10%);
          --bg: #0b0f19;
          --panel: #12182a;
          --panel-2: #0f1526;
          --text: #e8eefc;
          --muted: #a7b3d1;
          --border: rgba(255, 255, 255, 0.12);
          --accent: #7aa2ff;
          --accent-2: #60d394;
          --warning: #ffcc66;
          --shadow: rgba(0, 0, 0, 0.4);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 700px at 30% -10%, rgba(122, 162, 255, 0.25), transparent 60%),
          radial-gradient(1000px 600px at 80% 0%, rgba(96, 211, 148, 0.16), transparent 55%),
          var(--bg);
        color: var(--text);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .skip-link {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        transform: translateY(-140%);
        transition: transform 140ms ease;
        z-index: 1000;
      }

      .skip-link:focus {
        transform: translateY(0);
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(10px);
        background: color-mix(in oklab, var(--bg) 60%, transparent);
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 10px 16px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      @media (min-width: 900px) {
        .header-inner {
          grid-template-columns: 320px 1fr;
          align-items: center;
        }
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .brand .hint {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .controls {
        display: grid;
        gap: 8px;
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .search {
        flex: 1 1 320px;
        display: flex;
        gap: 8px;
      }

      input[type="search"] {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        outline: none;
      }

      input[type="search"]::placeholder {
        color: color-mix(in oklab, var(--muted) 80%, transparent);
      }

      .btn {
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        user-select: none;
      }

      .btn:hover {
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      input[type="search"]:focus-visible,
      .btn:focus-visible,
      .chip:focus-visible,
      details.feature > summary:focus-visible,
      details.scenario > summary:focus-visible {
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 40px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--panel-2) 84%, transparent);
        color: var(--text);
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .chip[data-active="true"] {
        border-color: color-mix(in oklab, var(--accent) 65%, var(--border));
        background: color-mix(in oklab, var(--accent) 18%, var(--panel));
      }

      .chip .count {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }

      main {
        padding-top: 18px;
      }

      .summary {
        color: var(--muted);
        font-size: 14px;
        margin: 0 0 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      @media (max-width: 899px) {
        .summary {
          margin-bottom: 18px;
        }
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .capability {
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          color-mix(in oklab, var(--panel) 92%, transparent),
          color-mix(in oklab, var(--panel-2) 98%, transparent)
        );
        border-radius: var(--radius);
        box-shadow: 0 8px 24px var(--shadow);
        overflow: hidden;
      }

      .capability-header {
        background-color: var(--capability-header-bg);
        padding: 14px 14px 10px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border);
      }

      .capability-title {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        font-weight: 750;
        color: color-mix(in oklab, var(--text) 90%, var(--muted));
      }

      .capability-meta {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .features {
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      details.feature {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        overflow: hidden;
      }

      details.feature > summary {
        list-style: none;
        cursor: pointer;
        display: grid;
        gap: 6px;
        padding: 12px 12px 10px;
      }

      details.feature > summary::-webkit-details-marker {
        display: none;
      }

      .feature-title {
        display: flex;
        gap: 10px;
        align-items: baseline;
        justify-content: space-between;
      }

      .feature-title h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .feature-path {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 52vw;
      }

      @media (min-width: 900px) {
        .feature-path {
          max-width: 520px;
        }
      }

      .feature-desc {
        padding: 0 12px 10px;
        color: var(--muted);
      }

      .scenario-list {
        border-top: 1px solid var(--border);
        padding: 10px 12px 12px;
        display: grid;
        gap: 10px;
      }

      details.scenario {
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--panel-2) 82%, transparent);
        border-radius: 12px;
        overflow: hidden;
      }

      details.scenario > summary {
        list-style: none;
        cursor: pointer;
        padding: 10px 10px 9px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      details.scenario > summary::-webkit-details-marker {
        display: none;
      }

      .scenario-name {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: baseline;
        min-width: 0;
      }

      .scenario-name .keyword {
        color: color-mix(in oklab, var(--accent-2) 75%, var(--text));
        font-weight: 750;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.2px;
      }

      .scenario-name .title {
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      .pill {
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: color-mix(in oklab, var(--panel) 80%, transparent);
      }

      .pill.warn {
        color: color-mix(in oklab, var(--warning) 92%, var(--text));
        border-color: color-mix(in oklab, var(--warning) 45%, var(--border));
        background: color-mix(in oklab, var(--warning) 10%, var(--panel));
      }

      .scenario-meta {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      pre.steps {
        margin: 0;
        padding: 12px 12px 13px;
        border: 1px solid color-mix(in oklab, var(--border) 80%, transparent);
        border-top-color: color-mix(in oklab, var(--border) 90%, transparent);
        border-radius: 12px;
        font: 14px/1.7 ui-monospace, "Cascadia Mono", "JetBrains Mono", "SF Mono", Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        letter-spacing: 0.1px;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        tab-size: 2;
        white-space: pre-wrap;
        word-break: break-word;
        background: black;
        color: #adb4c7;
        overflow: auto;
        scrollbar-color: color-mix(in oklab, var(--accent) 45%, transparent) color-mix(in oklab, #0a0f1f 92%, transparent);
      }

      pre.steps .gkw {
        color: color-mix(in oklab, var(--accent-2) 88%, #eaf0ff);
        font-weight: 760;
      }

      pre.steps .gpipe {
        color: color-mix(in oklab, #eaf0ff 55%, transparent);
      }

      pre.steps .gcell {
        color: color-mix(in oklab, #eaf0ff 88%, transparent);
      }

      pre.steps .gstr {
        color: color-mix(in oklab, var(--accent) 86%, #eaf0ff);
      }

      pre.steps mark {
        background: color-mix(in oklab, var(--accent) 34%, transparent);
        color: inherit;
        padding: 0 2px;
        border-radius: 4px;
      }

      pre.steps:focus-visible {
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .empty {
        padding: 26px 16px;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--muted);
        text-align: center;
        background: color-mix(in oklab, var(--panel) 70%, transparent);
      }

      .top-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        margin-bottom: 14px;
      }

      @media (min-width: 900px) {
        .top-grid {
          grid-template-columns: 1.15fr 0.85fr;
        }
      }

      .card {
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          color-mix(in oklab, var(--panel) 92%, transparent),
          color-mix(in oklab, var(--panel-2) 98%, transparent)
        );
        border-radius: var(--radius);
        box-shadow: 0 8px 24px var(--shadow);
        overflow: hidden;
      }

      .card-inner {
        background-color: var(--card-inner-bg);
        padding: 14px;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        align-items: baseline;
      }

      .title-row h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      @media (min-width: 680px) {
        .kpis {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      .kpi {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        padding: 10px 10px 8px;
      }

      .kpi .label {
        color: var(--muted);
        font-size: 12px;
      }

      .kpi .value {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.2px;
        font-variant-numeric: tabular-nums;
      }

      .bar {
        height: 40px;
        border-radius: 999px;
        background: color-mix(in oklab, var(--panel-2) 86%, transparent);
        overflow: hidden;
        border: 1px solid var(--border);
        margin-top: 10px;
      }

      .bar > .seg {
        height: 100%;
        float: left;
      }

      .bar-scale {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .bar-scale .center {
        justify-self: center;
      }

      .bar-scale .right {
        justify-self: end;
      }

      .seg.ok {
        background: color-mix(in oklab, var(--accent-2) 70%, transparent);
      }
      .seg.bad {
        background: color-mix(in oklab, #ff5c7a 85%, transparent);
      }
      .seg.warn {
        background: color-mix(in oklab, var(--warning) 85%, transparent);
      }
      .seg.other {
        background: color-mix(in oklab, var(--accent) 55%, transparent);
      }

      details.feature.report {
        border-radius: var(--radius);
      }

      .feature-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }

      .feature-head .name {
        margin: 0;
        font-size: 15px;
        font-weight: 760;
        letter-spacing: 0.2px;
      }

      .feature-head .counts {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: baseline;
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .feature-sub {
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .scenario-list.report {
        border-top: 1px solid var(--border);
        padding: 10px 12px 12px;
        display: grid;
        gap: 8px;
      }

      .scenario.report {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 10px 9px;
        background: color-mix(in oklab, var(--panel-2) 82%, transparent);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .scenario.report .name {
        min-width: 0;
        overflow-wrap: anywhere;
        font-weight: 650;
      }

      .badge,
      .summary-badge {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        border-radius: 999px;
        padding: 3px 8px;
        border: 1px solid var(--border);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        background: transparent;
        color: inherit;
        font: inherit;
      }

      .badge {
        cursor: default;
      }

      .summary-badge {
        appearance: none;
        cursor: pointer;
        touch-action: manipulation;
      }

      .summary-badge:hover {
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      .badge:focus-visible,
      .summary-badge:focus-visible {
        outline: 3px solid color-mix(in oklab, var(--accent) 70%, transparent);
        outline-offset: 2px;
      }

      .badge[data-active="true"],
      .summary-badge[data-active="true"] {
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
      }

      .badge.ok,
      .summary-badge.ok {
        color: color-mix(in oklab, var(--accent-2) 85%, var(--text));
        background: color-mix(in oklab, var(--accent-2) 14%, transparent);
        border-color: color-mix(in oklab, var(--accent-2) 55%, var(--border));
      }

      .badge.bad,
      .summary-badge.bad {
        color: color-mix(in oklab, #ff5c7a 90%, var(--text));
        background: color-mix(in oklab, #ff5c7a 12%, transparent);
        border-color: color-mix(in oklab, #ff5c7a 55%, var(--border));
      }

      .badge.warn,
      .summary-badge.warn {
        color: color-mix(in oklab, var(--warning) 92%, var(--text));
        background: color-mix(in oklab, var(--warning) 16%, transparent);
        border-color: color-mix(in oklab, var(--warning) 55%, var(--border));
      }

      .badge.other,
      .summary-badge.other {
        color: color-mix(in oklab, var(--accent) 90%, var(--text));
        background: color-mix(in oklab, var(--accent) 12%, transparent);
        border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
      }

      .summary-badges {
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .summary-badges .summary-badge {
        font-size: 13px;
        font-weight: 850;
        padding: 8px 12px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      @media (max-width: 899px) {
        .summary-badges {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .summary-badges .summary-badge {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          scroll-behavior: auto !important;
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#mainContent">Aller au contenu</a>
    <header>
      <div class="header-inner">
        <div class="brand">
          <h1>Client Pack</h1>
          <p class="hint">Capabilities → features → scenarios</p>
        </div>
        <div class="controls">
          <div class="row search">
            <label class="sr-only" for="search">Rechercher</label>
            <input id="search" type="search" placeholder='Rechercher (ex: "offline", "@wip", "scoreboard")' />
          </div>
          <div class="row">
            <div id="capabilityChips" class="chips" role="list"></div>
            <button id="pickDir" class="btn" type="button">Choisir capabilities/</button>
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <main id="mainContent">
        <section id="dashboard">
          <div class="top-grid">
            <section class="card" aria-label="Résumé">
              <div class="card-inner">
                <div class="title-row">
                  <h2>Dashboard</h2>
                  <div id="dashboardRunMeta" class="meta"></div>
                </div>
                <div class="kpis">
                  <div class="kpi">
                    <div class="label">Scénarios</div>
                    <div id="dashboardKpiScenarios" class="value">—</div>
                  </div>
                  <div class="kpi">
                    <div class="label">Features</div>
                    <div id="dashboardKpiFeatures" class="value">—</div>
                  </div>
                  <div class="kpi">
                    <div class="label">État</div>
                    <div id="dashboardKpiState" class="value">—</div>
                  </div>
                  <div class="kpi">
                    <div class="label">Durée</div>
                    <div id="dashboardKpiDuration" class="value">—</div>
                  </div>
                </div>
                <div class="bar" aria-label="Répartition des statuts">
                  <div id="dashboardBarPassed" class="seg ok"></div>
                  <div id="dashboardBarFailed" class="seg bad"></div>
                  <div id="dashboardBarSkipped" class="seg warn"></div>
                  <div id="dashboardBarOther" class="seg other"></div>
                </div>
                <div class="bar-scale">
                  <div>0%</div>
                  <div id="dashboardBarPassedPct" class="center">passed en 0%</div>
                  <div class="right">100%</div>
                </div>
                <div id="dashboardBarLegend" class="meta" style="margin-top: 8px"></div>
              </div>
            </section>

            <section class="card" aria-label="Aperçu">
              <div class="card-inner">
                <div class="title-row">
                  <h2>Preview</h2>
                  <div id="dashboardUpdatedMeta" class="meta"></div>
                </div>
                <div id="dashboardOverview" class="meta" style="margin-top: 10px"></div>
              </div>
            </section>
          </div>
        </section>

        <p id="summary" class="summary"></p>
        <div id="content" class="grid"></div>
      </main>
    </div>

    <input
      id="pickDirInput"
      type="file"
      webkitdirectory
      directory
      multiple
      style="position: absolute; left: -9999px; width: 1px; height: 1px"
    />
    <input
      id="pickFilesInput"
      type="file"
      multiple
      accept=".feature"
